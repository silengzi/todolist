services:
  todolist:
    image: todolist:latest
    container_name: todolist
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 将宿主机的数据库文件挂载进容器
      - /opt/todolist/data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
      # 其他环境变量（JWT secret 等）
      - JWT_SECRET=your_secret_here